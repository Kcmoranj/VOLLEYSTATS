<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipo | VolleyStats</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/brand.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-[#F3F4F6] flex min-h-screen font-sans">

    <!-- Mobile topbar -->
    <div class="lg:hidden fixed top-0 left-0 right-0 z-20 bg-white border-b flex items-center gap-3 px-4 h-14 shadow-sm">
        <button onclick="openSidebar()" class="text-gray-700 text-xl font-bold">&#9776;</button>
        <span class="text-lg font-black">Volley<span class="text-blue-600">Stats</span></span>
    </div>

    <!-- Overlay (mobile) -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/40 z-30 hidden lg:hidden" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed lg:sticky top-0 left-0 h-screen z-40 w-64 bg-white border-r flex flex-col -translate-x-full lg:translate-x-0 transition-transform duration-200 ease-in-out">
        <div class="flex-1 min-h-0 overflow-y-auto py-4 px-3 space-y-1">
            <a href="partidos.html" class="flex items-center gap-2 px-4 pb-4 border-b border-gray-100 mb-2">
                <span class="text-2xl font-black">Volley<span class="text-blue-600">Stats</span></span>
            </a>
            <a href="partidos.html" class="flex items-center gap-3 p-3 rounded-lg font-semibold hover:bg-gray-100 text-gray-600" onclick="closeSidebar()">📅 Partidos</a>
            <a href="liga.html" class="flex items-center gap-3 p-3 rounded-lg font-semibold hover:bg-gray-100 text-gray-600" onclick="closeSidebar()">🏆 Liga</a>
            <a href="jugadores.html" class="flex items-center gap-3 p-3 rounded-lg font-semibold hover:bg-gray-100 text-gray-600" onclick="closeSidebar()">👤 Jugadores</a>
            <a href="estadisticas.html" class="flex items-center gap-3 p-3 rounded-lg font-semibold hover:bg-gray-100 text-gray-600" onclick="closeSidebar()">📊 Estadísticas</a>
        </div>
        <div class="shrink-0 px-3 py-4 border-t">
            <button onclick="window.logout('../index.html')" class="flex items-center gap-3 px-4 py-3 rounded-xl w-full text-left font-semibold text-sm text-red-600 hover:bg-red-50">
                <span>➡️</span>Cerrar sesión
            </button>
        </div>
    </aside>

    <script>
    function openSidebar()  { document.getElementById('sidebar').classList.remove('-translate-x-full'); document.getElementById('sidebarOverlay').classList.remove('hidden'); }
    function closeSidebar() { document.getElementById('sidebar').classList.add('-translate-x-full');    document.getElementById('sidebarOverlay').classList.add('hidden'); }
    </script>

<main class="flex-1 overflow-y-auto pt-16 lg:pt-0 ">

    <!-- Hero -->
    <div class="bg-gradient-to-r from-blue-700 to-blue-800 px-8 py-8 text-white">
        <a href="javascript:history.back()" class="text-slate-300 text-sm font-bold hover:text-white mb-3 block">← Volver</a>
        <h1 id="nombreEquipo" class="text-3xl font-black">—</h1>
        <p id="subtituloEquipo" class="text-slate-300 text-sm mt-1">—</p>
    </div>

    <div class="p-8 space-y-8 max-w-4xl">

        <!-- Sin datos -->
        <div id="sinDatos" class="hidden bg-white rounded-xl border border-gray-200 p-8 text-center text-gray-400 font-semibold">
            No se encontró este equipo.
        </div>

        <!-- Participaciones -->
        <div id="contenidoEquipo" class="space-y-6"></div>

    </div>
</main>

<script src="../js/mock-data.js"></script>
<script src="../js/shared/data-bridge.js"></script>
<script src="../js/modules/auth.js"></script>
<script>
const escHTML = window.escHTML;

document.addEventListener('DOMContentLoaded', () => {
    const data = window.AppDB.get();
    const idEquipo = parseInt(new URLSearchParams(window.location.search).get('id'));
    const equipo = data.equipos.find(e => e.id === idEquipo);

    if (!equipo) {
        document.getElementById('sinDatos').classList.remove('hidden');
        return;
    }

    document.title = `${equipo.nombre} | VolleyStats`;
    document.getElementById('nombreEquipo').textContent = equipo.nombre;

    const participaciones = data.participaciones.filter(p => p.id_equipo === idEquipo);
    const aprobadas = participaciones.filter(p => p.aprobado).length;
    document.getElementById('subtituloEquipo').textContent =
        `${participaciones.length} participación${participaciones.length !== 1 ? 'es' : ''} · ${aprobadas} aprobada${aprobadas !== 1 ? 's' : ''}`;

    const contenido = document.getElementById('contenidoEquipo');

    if (participaciones.length === 0) {
        contenido.innerHTML = `<div class="bg-white rounded-xl border p-6 text-center text-gray-400">Sin participaciones registradas.</div>`;
        return;
    }

    contenido.innerHTML = participaciones.map(p => {
        const cat  = data.categoriasTorneo.find(c => c.id === p.id_categoria_torneo);
        const rama = data.ramas.find(r => r.id === p.id_rama);

        const inscripciones = data.inscripciones.filter(i => i.id_participacion === p.id);
        const jugadores = inscripciones.map(ins => {
            const j = data.jugadores.find(x => x.id === ins.id_jugador);
            const catJ = data.categoriasJugador.find(c => c.id === j?.id_categoria_jugador);
            return { ins, j, catJ };
        }).filter(x => x.j && x.j.estado === 'APROBADO');

        const estadoBadge = p.aprobado
            ? '<span class="badge badge-success badge-sm text-white font-bold">Aprobado</span>'
            : '<span class="badge badge-warning badge-sm text-white font-bold">Pendiente</span>';

        const jugadoresHTML = jugadores.length === 0
            ? '<p class="text-gray-400 italic text-sm py-2">Sin jugadores registrados.</p>'
            : `<div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mt-3">
                ${jugadores.map(({ ins, j, catJ }) => `
                <div class="flex items-center gap-3 bg-gray-50 rounded-lg px-3 py-2">
                    <span class="text-lg font-black text-blue-600 w-8 text-center">#${ins.numero_camiseta}</span>
                    <div>
                        <p class="font-bold text-gray-800 text-sm">${escHTML(j.nombre)}</p>
                        <p class="text-[10px] text-gray-400 font-bold uppercase">${escHTML(catJ?.nombre || '—')}</p>
                    </div>
                </div>`).join('')}
               </div>`;

        // Partidos de esta participación
        const partidos = data.partidos.filter(pt =>
            pt.id_local_participacion === p.id || pt.id_visitante_participacion === p.id
        ).sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

        const historialHTML = partidos.length === 0
            ? ''
            : `<div class="mt-4 border-t pt-4">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">Historial</p>
                <div class="space-y-1">
                ${partidos.slice(0, 5).map(pt => {
                    const esLocal = pt.id_local_participacion === p.id;
                    const idRival = esLocal ? pt.id_visitante_participacion : pt.id_local_participacion;
                    const partRival = data.participaciones.find(x => x.id === idRival);
                    const rival = data.equipos.find(e => e.id === partRival?.id_equipo)?.nombre || '—';
                    let sL = 0, sV = 0;
                    (pt.sets || []).forEach(s => { if (s.local > s.visitante) sL++; else sV++; });
                    const gano = esLocal ? sL > sV : sV > sL;
                    const estado = String(pt.estado || '').toUpperCase();
                    const marcador = estado === 'FINALIZADO'
                        ? `<span class="font-black ${gano ? 'text-green-600' : 'text-red-500'}">${esLocal ? sL : sV}–${esLocal ? sV : sL}</span>`
                        : `<span class="text-gray-400 text-xs">${pt.fecha}</span>`;
                    return `<div class="flex justify-between items-center text-xs py-1">
                        <span class="text-gray-600">${estado === 'FINALIZADO' ? (gano ? '✅' : '❌') : '📅'} vs ${escHTML(rival)}</span>
                        ${marcador}
                    </div>`;
                }).join('')}
                </div>
               </div>`;

        return `
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
                <div>
                    <p class="font-black text-gray-900">${escHTML(cat?.nombre || '—')} · ${escHTML(rama?.nombre || '—')}</p>
                    <p class="text-xs text-gray-400 mt-0.5">Grupo ${escHTML(p.grupo || '—')} · ${jugadores.length} jugador${jugadores.length !== 1 ? 'es' : ''}</p>
                </div>
                ${estadoBadge}
            </div>
            <div class="px-6 py-4">
                ${p.tecnico ? `<p class="text-xs text-gray-500 mb-3">👨‍🏫 Técnico: <strong>${escHTML(p.tecnico)}</strong>${p.asistente ? ` · Asistente: <strong>${escHTML(p.asistente)}</strong>` : ''}</p>` : ''}
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">Plantel</p>
                ${jugadoresHTML}
                ${historialHTML}
            </div>
        </div>`;
    }).join('');
});
</script>
</body>
</html>

</html>
