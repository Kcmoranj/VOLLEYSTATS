<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VolleyStats - Partidos</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/brand.css">
</head>
<body class="bg-[#F3F4F6] flex min-h-screen font-sans">

    <!-- Mobile topbar -->
    <div class="lg:hidden fixed top-0 left-0 right-0 z-20 bg-white border-b flex items-center gap-3 px-4 h-14 shadow-sm">
        <button onclick="openSidebar()" class="text-gray-700 text-xl font-bold">&#9776;</button>
        <span class="text-lg font-black">Volley<span class="text-blue-600">Stats</span></span>
    </div>

    <!-- Overlay (mobile) -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/40 z-30 hidden lg:hidden" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed lg:sticky top-0 left-0 h-screen z-40 w-64 bg-white border-r flex flex-col -translate-x-full lg:translate-x-0 transition-transform duration-200 ease-in-out">
        <div class="flex-1 min-h-0 overflow-y-auto py-4 px-3 space-y-1">
            <a href="partidos.html" class="flex items-center gap-2 px-4 pb-4 border-b border-gray-100 mb-2">
                <span class="text-2xl font-black">Volley<span class="text-blue-600">Stats</span></span>
            </a>
            <a href="partidos.html" class="flex items-center gap-3 p-3 rounded-lg font-semibold bg-blue-50 text-blue-600" onclick="closeSidebar()">📅 Partidos</a>
            <a href="liga.html" class="flex items-center gap-3 p-3 rounded-lg font-semibold hover:bg-gray-100 text-gray-600" onclick="closeSidebar()">🏆 Liga</a>
            <a href="jugadores.html" class="flex items-center gap-3 p-3 rounded-lg font-semibold hover:bg-gray-100 text-gray-600" onclick="closeSidebar()">👤 Jugadores</a>
            <a href="estadisticas.html" class="flex items-center gap-3 p-3 rounded-lg font-semibold hover:bg-gray-100 text-gray-600" onclick="closeSidebar()">📊 Estadísticas</a>
        </div>
        <div class="shrink-0 px-3 py-4 border-t">
            <button onclick="window.logout('../index.html')" class="flex items-center gap-3 px-4 py-3 rounded-xl w-full text-left font-semibold text-sm text-red-600 hover:bg-red-50">
                <span>➡️</span>Cerrar sesión
            </button>
        </div>
    </aside>

    <script>
    function openSidebar()  { document.getElementById('sidebar').classList.remove('-translate-x-full'); document.getElementById('sidebarOverlay').classList.remove('hidden'); }
    function closeSidebar() { document.getElementById('sidebar').classList.add('-translate-x-full');    document.getElementById('sidebarOverlay').classList.add('hidden'); }
    </script>

<main class="flex-1 p-4 md:p-8 space-y-5 overflow-y-auto pt-16 lg:pt-0 ">

    <!-- Header row -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
        <h1 class="text-2xl font-black text-gray-900">Calendario de Partidos</h1>
        <!-- Estado tabs -->
        <div class="flex gap-1 bg-white border border-gray-200 rounded-xl p-1 self-start">
            <button id="tabTodos"      onclick="setTab('todos')"      class="tab-btn px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-wide transition-all">Todos</button>
            <button id="tabProximos"   onclick="setTab('proximos')"   class="tab-btn px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-wide transition-all">Próximos</button>
            <button id="tabResultados" onclick="setTab('resultados')" class="tab-btn px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-wide transition-all">Resultados</button>
        </div>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3">
        <div>
            <label class="text-[10px] font-bold text-gray-400 uppercase block mb-1">Buscar equipo</label>
            <input id="filtroTexto" type="text" placeholder="Nombre del equipo..."
                class="input input-bordered input-sm w-full">
        </div>
        <div>
            <label class="text-[10px] font-bold text-gray-400 uppercase block mb-1">Fecha</label>
            <select id="filtroFecha" class="select select-bordered select-sm w-full font-semibold">
                <option value="">Todas las fechas</option>
            </select>
        </div>
        <div>
            <label class="text-[10px] font-bold text-gray-400 uppercase block mb-1">Categoría</label>
            <select id="filtroCategoria" class="select select-bordered select-sm w-full font-semibold">
                <option value="">Todas</option>
            </select>
        </div>
        <div>
            <label class="text-[10px] font-bold text-gray-400 uppercase block mb-1">Rama</label>
            <select id="filtroRama" class="select select-bordered select-sm w-full font-semibold">
                <option value="">Todas</option>
            </select>
        </div>
        <div class="flex items-end">
            <p id="contadorPartidos" class="text-xs text-gray-400 font-semibold pb-1"></p>
        </div>
    </div>

    <!-- Cancha tabs + grids -->
    <div id="canchaTabsContainer" class="hidden">
        <div id="canchaTabBtns" class="flex gap-2 flex-wrap mb-4"></div>
        <!-- Per-cancha columns rendered by JS -->
        <div id="canchaColumnas" class="grid gap-6"></div>
    </div>

    <!-- Fallback: no cancha split -->
    <div id="listaPartidos" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

</main>

<script src="../js/mock-data.js"></script>
<script src="../js/shared/data-bridge.js"></script>
<script src="../js/modules/partidos.js"></script>
<script src="../js/modules/auth.js"></script>
</body>
</html>

</html>
