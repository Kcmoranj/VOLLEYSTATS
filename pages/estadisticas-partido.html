<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VolleyStats - Detalle del Partido</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/brand.css">
    <style>
        .cancha-mini {
            background: #15803d;
            border: 2px solid #bbf7d0;
            border-radius: .5rem;
            padding: .35rem;
            display: grid;
            grid-template-rows: 1fr 1fr;
            gap: .25rem;
            aspect-ratio: 1.8 / 1;
        }
        .cancha-mini-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .25rem; }
        .cancha-mini-cell {
            background: rgba(255,255,255,.15);
            border: 1px solid rgba(255,255,255,.25);
            border-radius: .3rem;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: .2rem; min-height: 2.2rem;
        }
        .cancha-mini-cell.filled { background: rgba(255,255,255,.35); }
        .cancha-mini-cell .pnum { font-size: .5rem; font-weight: 900; color: #bbf7d0; }
        .cancha-mini-cell .pname { font-size: .5rem; font-weight: 700; color: white;
            max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center; }
        .net-mini { height: .3rem; background: #bbf7d0; border-radius: .15rem;
                    display: flex; align-items: center; justify-content: center; margin: .2rem 0; }
        .net-mini span { font-size: .45rem; font-weight: 900; color: #15803d;
                         background: #bbf7d0; padding: 0 .3rem; border-radius: .15rem; }
        .libero-mini { display: flex; align-items: center; gap: .4rem; padding: .3rem .5rem;
                       background: #f3e8ff; border: 1px solid #e9d5ff; border-radius: .5rem; margin-top: .35rem; }
        .libero-mini .lb { font-size: .5rem; font-weight: 900; color: #7c3aed;
                           background: #ede9fe; padding: .15rem .3rem; border-radius: .25rem; }

        .set-bar-wrap { display: flex; gap: .25rem; align-items: center; }
        .set-bar { height: .5rem; border-radius: 9999px; transition: width .4s; min-width: .5rem; }
    </style>
</head>
<body class="bg-[#F3F4F6] min-h-screen flex font-sans">

    <aside class="w-64 bg-white border-r h-screen sticky top-0 flex-shrink-0 flex flex-col">
        <span class="p-6 block text-2xl font-black">Volley<span class="text-blue-600">Stats</span></span>
        <nav class="flex-1 flex flex-col gap-2 px-4">
            <a href="partidos.html"     class="flex items-center gap-3 p-3 rounded-lg font-semibold bg-blue-50 text-blue-600">📅 Partidos</a>
            <a href="liga.html"         class="flex items-center gap-3 p-3 rounded-lg font-semibold hover:bg-gray-100 text-gray-600">🏆 Liga</a>
            <a href="jugadores.html"    class="flex items-center gap-3 p-3 rounded-lg font-semibold hover:bg-gray-100 text-gray-600">👤 Jugadores</a>
            <a href="estadisticas.html" class="flex items-center gap-3 p-3 rounded-lg font-semibold hover:bg-gray-100 text-gray-600">📊 Estadísticas</a>
        </nav>
        <div class="p-4 border-t">
            <button onclick="logout()" class="text-red-600 font-bold hover:bg-red-50 p-3 rounded-lg w-full text-left">➡️ Cerrar sesión</button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto">

        <!-- Hero -->
        <div id="heroPartido" class="bg-gradient-to-r from-blue-700 to-blue-800 text-white px-8 py-8">
            <!-- injected -->
        </div>

        <div class="p-6 md:p-8 max-w-5xl space-y-8">

            <a href="partidos.html" class="text-blue-600 font-bold text-sm hover:underline block -mt-2">← Volver al calendario</a>

            <!-- Sets breakdown -->
            <div id="setsSection" class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 hidden"></div>

            <!-- Alineaciones R5 -->
            <div id="alineacionesSection" class="hidden"></div>

            <!-- Stats tabs -->
            <div id="statsSection" class="hidden">
                <div class="flex gap-2 mb-4" id="statsTabs"></div>
                <div id="statsContent"></div>
            </div>

            <!-- Tarjetas en este partido -->
            <div id="tarjetasSection" class="hidden"></div>

        </div>
    </main>

    <script src="../js/mock-data.js"></script>
    <script src="../js/shared/data-bridge.js"></script>
    <script src="../js/shared/sanciones.js"></script>
<script>
const escHTML = window.escHTML;
function logout() { window.logout('../index.html'); }

const POSICIONES = [
    { key:'pos4', roman:'IV' }, { key:'pos3', roman:'III' }, { key:'pos2', roman:'II' },
    { key:'pos5', roman:'V'  }, { key:'pos6', roman:'VI'  }, { key:'pos1', roman:'I'  },
];

let _statsTab = 'local';

document.addEventListener('DOMContentLoaded', () => {
    const data = window.AppDB.get();
    const idPartido = parseInt(new URLSearchParams(window.location.search).get('id'));
    const partido = data.partidos?.find(p => p.id === idPartido);
    if (!partido || !data) return;

    const lp   = data.participaciones.find(p => p.id === partido.id_local_participacion);
    const vp   = data.participaciones.find(p => p.id === partido.id_visitante_participacion);
    const eqL  = data.equipos.find(e => e.id === lp?.id_equipo);
    const eqV  = data.equipos.find(e => e.id === vp?.id_equipo);
    const cat  = data.categoriasTorneo.find(c => c.id === lp?.id_categoria_torneo);
    const rama = data.ramas.find(r => r.id === lp?.id_rama);

    const estado = String(partido.estado || '').toUpperCase().trim();
    let sL = 0, sV = 0;
    (partido.sets || []).forEach(s => {
        if (s.local > s.visitante) sL++;
        else if (s.visitante > s.local) sV++;
    });

    // ── Hero ──────────────────────────────────────────────────
    const estadoBadge = estado === 'FINALIZADO'
        ? (partido.wo
            ? `<span class="bg-amber-400 text-amber-900 text-xs font-black px-3 py-1 rounded-full">W.O.</span>`
            : `<span class="bg-white/20 text-white text-xs font-black px-3 py-1 rounded-full">Finalizado</span>`)
        : estado === 'EN_PROGRESO'
        ? `<span class="bg-red-400 text-white text-xs font-black px-3 py-1 rounded-full animate-pulse">En vivo</span>`
        : `<span class="bg-white/20 text-white text-xs font-black px-3 py-1 rounded-full">Programado</span>`;

    document.title = `${eqL?.nombre || 'Local'} vs ${eqV?.nombre || 'Visitante'} | VolleyStats`;

    document.getElementById('heroPartido').innerHTML = `
        <div class="flex items-center gap-2 mb-4 flex-wrap">
            ${estadoBadge}
            <span class="text-blue-200 text-xs font-bold">${cat?.nombre || ''} · ${rama?.nombre || ''}</span>
        </div>
        <div class="grid grid-cols-7 items-center gap-3">
            <div class="col-span-2 text-center">
                <div class="text-4xl font-black leading-none ${sL > sV && estado==='FINALIZADO' ? 'text-white' : 'text-blue-200'}">${escHTML(eqL?.nombre || 'Local')}</div>
                <div class="text-blue-300 text-xs font-bold mt-1 uppercase">Local</div>
            </div>
            <div class="col-span-3 text-center">
                <div class="flex items-center justify-center gap-4 text-5xl font-black">
                    <span class="${sL > sV && estado==='FINALIZADO' ? 'text-white' : 'text-blue-200'}">${sL}</span>
                    <span class="text-blue-400 text-3xl font-light">–</span>
                    <span class="${sV > sL && estado==='FINALIZADO' ? 'text-white' : 'text-blue-200'}">${sV}</span>
                </div>
                <div class="text-blue-300 text-[10px] font-black uppercase tracking-widest mt-1">sets ganados</div>
            </div>
            <div class="col-span-2 text-center">
                <div class="text-4xl font-black leading-none ${sV > sL && estado==='FINALIZADO' ? 'text-white' : 'text-blue-200'}">${escHTML(eqV?.nombre || 'Visitante')}</div>
                <div class="text-blue-300 text-xs font-bold mt-1 uppercase">Visitante</div>
            </div>
        </div>
        <div class="mt-5 flex flex-wrap gap-4 text-blue-200 text-xs font-bold">
            <span>📅 ${partido.fecha}</span>
            <span>🕒 ${partido.hora || '—'}</span>
            <span>📍 ${escHTML(partido.ubicacion || '—')}</span>
        </div>`;

    // ── Sets breakdown ─────────────────────────────────────────
    if (partido.sets?.length) {
        const sec = document.getElementById('setsSection');
        sec.classList.remove('hidden');
        sec.innerHTML = `
            <h2 class="text-sm font-black text-gray-400 uppercase tracking-wider mb-5">Resultado por Set</h2>
            <div class="space-y-4">
            ${partido.sets.map((s, i) => {
                const total = s.local + s.visitante || 1;
                const wL = Math.round((s.local / total) * 100);
                const wV = 100 - wL;
                const lWon = s.local > s.visitante;
                return `
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs font-black text-gray-500 uppercase">Set ${i+1}</span>
                        <span class="text-xs font-bold text-gray-400">${s.local} – ${s.visitante}</span>
                    </div>
                    <div class="flex gap-1 h-6 rounded-lg overflow-hidden">
                        <div class="flex items-center justify-center text-white text-xs font-black transition-all ${lWon ? 'bg-blue-600' : 'bg-blue-300'}"
                             style="width:${wL}%">${s.local > 0 ? s.local : ''}</div>
                        <div class="flex items-center justify-center text-white text-xs font-black transition-all ${!lWon ? 'bg-slate-600' : 'bg-slate-300'}"
                             style="width:${wV}%">${s.visitante > 0 ? s.visitante : ''}</div>
                    </div>
                    <div class="flex justify-between mt-0.5">
                        <span class="text-[9px] text-gray-400 font-bold">${escHTML(eqL?.nombre || 'Local')}</span>
                        <span class="text-[9px] text-gray-400 font-bold">${escHTML(eqV?.nombre || 'Visitante')}</span>
                    </div>
                </div>`;
            }).join('')}
            </div>`;
    }

    // ── Alineaciones R5 ────────────────────────────────────────
    const r5Local = (data.r5 || []).filter(r => r.id_partido === idPartido && r.id_participacion === partido.id_local_participacion);
    const r5Visit = (data.r5 || []).filter(r => r.id_partido === idPartido && r.id_participacion === partido.id_visitante_participacion);

    if (r5Local.length || r5Visit.length) {
        const sec = document.getElementById('alineacionesSection');
        sec.classList.remove('hidden');

        const allSets = [...new Set([...r5Local, ...r5Visit].map(r => r.numero_set || 1))].sort();

        const buildMiniCancha = (r5, idPart) => {
            if (!r5) return `<div class="text-gray-400 italic text-xs text-center py-4">Sin R5 registrado</div>`;

            const alin = r5.alineacion || {};
            const getName = (idIns) => {
                if (!idIns) return null;
                const ins = data.inscripciones.find(i => i.id === idIns);
                const j = data.jugadores.find(x => x.id === ins?.id_jugador);
                return j ? `#${ins.numero_camiseta} ${j.nombre.split(' ')[0]}` : null;
            };

            const cell = (key, roman) => {
                const name = getName(alin[key]);
                return `<div class="cancha-mini-cell ${name ? 'filled' : ''}">
                    <span class="pnum">${roman}</span>
                    ${name ? `<span class="pname">${escHTML(name)}</span>` : ''}
                </div>`;
            };

            const liberoName = getName(alin.libero);
            const liberoHTML = liberoName
                ? `<div class="libero-mini"><span class="lb">LÍB</span><span style="font-size:.5rem;font-weight:700;color:#6d28d9">${escHTML(liberoName)}</span></div>`
                : '';

            return `
            <div>
                <div class="net-mini"><span>RED</span></div>
                <div class="cancha-mini">
                    <div class="cancha-mini-row">
                        ${cell('pos4','IV')}${cell('pos3','III')}${cell('pos2','II')}
                    </div>
                    <div class="cancha-mini-row">
                        ${cell('pos5','V')}${cell('pos6','VI')}${cell('pos1','I')}
                    </div>
                </div>
                <div class="net-mini mt-1"><span>FONDO</span></div>
                ${liberoHTML}
            </div>`;
        };

        sec.innerHTML = `
            <h2 class="text-sm font-black text-gray-400 uppercase tracking-wider mb-4">🏐 Alineaciones (R5)</h2>
            <div class="space-y-6">
            ${allSets.map(numSet => {
                const rL = r5Local.find(r => (r.numero_set || 1) === numSet);
                const rV = r5Visit.find(r => (r.numero_set || 1) === numSet);
                if (!rL && !rV) return '';
                return `
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
                    <p class="text-xs font-black text-blue-600 uppercase tracking-wider mb-4">Set ${numSet}</p>
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <p class="text-xs font-black text-gray-700 mb-2 truncate">${escHTML(eqL?.nombre || 'Local')}</p>
                            ${buildMiniCancha(rL, partido.id_local_participacion)}
                        </div>
                        <div>
                            <p class="text-xs font-black text-gray-700 mb-2 truncate">${escHTML(eqV?.nombre || 'Visitante')}</p>
                            ${buildMiniCancha(rV, partido.id_visitante_participacion)}
                        </div>
                    </div>
                </div>`;
            }).join('')}
            </div>`;
    }

    // ── Stats by team ──────────────────────────────────────────
    const statsPartido = data.estadisticasJugador?.filter(s => s.id_partido === idPartido) || [];

    if (statsPartido.length) {
        const sec = document.getElementById('statsSection');
        sec.classList.remove('hidden');

        const insLocal = data.inscripciones.filter(i => i.id_participacion === partido.id_local_participacion).map(i => i.id);
        const insVisit = data.inscripciones.filter(i => i.id_participacion === partido.id_visitante_participacion).map(i => i.id);

        const statsL = statsPartido.filter(s => insLocal.includes(s.id_inscripcion)).sort((a,b)=>(b.puntos||0)-(a.puntos||0));
        const statsV = statsPartido.filter(s => insVisit.includes(s.id_inscripcion)).sort((a,b)=>(b.puntos||0)-(a.puntos||0));

        window._statsTeams = { local: statsL, visitante: statsV };
        window._statsData  = data;

        const tabBtns = document.getElementById('statsTabs');
        tabBtns.innerHTML = `
            <button id="tabStatsLocal"    onclick="setStatsTab('local')"
                class="px-4 py-2 rounded-xl text-xs font-black uppercase transition-all bg-blue-600 text-white shadow-sm">
                ${escHTML(eqL?.nombre || 'Local')}
            </button>
            <button id="tabStatsVisita"   onclick="setStatsTab('visitante')"
                class="px-4 py-2 rounded-xl text-xs font-black uppercase transition-all bg-white text-gray-600 border border-gray-200">
                ${escHTML(eqV?.nombre || 'Visitante')}
            </button>
            <button id="tabStatsTodos"    onclick="setStatsTab('todos')"
                class="px-4 py-2 rounded-xl text-xs font-black uppercase transition-all bg-white text-gray-600 border border-gray-200">
                Todos
            </button>`;

        renderStatsTab('local');
    }

    // ── Tarjetas en este partido ───────────────────────────────
    const tarjetas = (data.sancionesJugador || []).filter(s => s.id_partido === idPartido);
    if (tarjetas.length) {
        const sec = document.getElementById('tarjetasSection');
        sec.classList.remove('hidden');
        sec.innerHTML = `
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
                <h2 class="text-sm font-black text-gray-400 uppercase tracking-wider mb-4">🟨 Tarjetas en este partido</h2>
                <div class="space-y-2">
                ${tarjetas.map(t => {
                    const ins = data.inscripciones.find(i => i.id === t.id_inscripcion);
                    const jug = data.jugadores.find(j => j.id === ins?.id_jugador);
                    const part = data.participaciones.find(p => p.id === ins?.id_participacion);
                    const eq  = data.equipos.find(e => e.id === part?.id_equipo);
                    const badge = t.tipo === 'ROJA'
                        ? '<span class="badge badge-error badge-sm text-white font-bold">🟥 Roja</span>'
                        : '<span class="badge badge-warning badge-sm text-white font-bold">🟨 Amarilla</span>';
                    const susp = (t.partidos_suspension || 0) > 0
                        ? `<span class="text-red-500 text-xs font-bold">${t.partidos_suspension} partido${t.partidos_suspension>1?'s':''} susp.</span>`
                        : '';
                    return `
                    <div class="flex items-center gap-3 py-2 border-b border-gray-50 last:border-0">
                        ${badge}
                        <div class="flex-1">
                            <span class="font-black text-gray-800 text-sm">${escHTML(jug?.nombre || '—')}</span>
                            <span class="text-gray-400 text-xs ml-2">${escHTML(eq?.nombre || '—')}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            ${susp}
                            <span class="text-gray-400 text-xs">${t.motivo || ''}</span>
                        </div>
                    </div>`; 
                }).join('')}
                </div>
            </div>`;
    }
});

window.setStatsTab = function(tab) {
    _statsTab = tab;
    ['Local','Visita','Todos'].forEach(t => {
        const el = document.getElementById(`tabStats${t}`);
        if (!el) return;
        const key = t.toLowerCase() === 'visita' ? 'visitante' : t.toLowerCase();
        const active = key === tab;
        el.className = `px-4 py-2 rounded-xl text-xs font-black uppercase transition-all ${active ? 'bg-blue-600 text-white shadow-sm' : 'bg-white text-gray-600 border border-gray-200'}`;
    });
    renderStatsTab(tab);
};

function renderStatsTab(tab) {
    const data   = _statsData;
    const teams  = _statsTeams;
    const stats  = tab === 'todos'
        ? [...(teams.local||[]), ...(teams.visitante||[])].sort((a,b)=>(b.puntos||0)-(a.puntos||0))
        : (teams[tab] || []);

    if (!stats.length) {
        document.getElementById('statsContent').innerHTML =
            `<div class="bg-white rounded-2xl border border-gray-100 p-8 text-center text-gray-400 font-semibold">Sin estadísticas registradas.</div>`;
        return;
    }

    // Highlight leaders for each stat
    const best = {};
    ['puntos','ataque','bloqueo','saque','defensa','colocacion'].forEach(k => {
        best[k] = Math.max(...stats.map(s => s[k] || 0));
    });

    document.getElementById('statsContent').innerHTML = `
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-[10px] text-gray-400 uppercase font-black border-b border-gray-100">
                            <th class="text-left px-5 py-3">Jugador</th>
                            <th class="text-center px-3 py-3 text-blue-600">PTS</th>
                            <th class="text-center px-3 py-3">ATQ</th>
                            <th class="text-center px-3 py-3">BLQ</th>
                            <th class="text-center px-3 py-3">SAQ</th>
                            <th class="text-center px-3 py-3">DEF</th>
                            <th class="text-center px-3 py-3">COL</th>
                        </tr>
                    </thead>
                    <tbody>
                    ${stats.map((s, i) => {
                        const ins = data.inscripciones.find(x => x.id === s.id_inscripcion);
                        const jug = data.jugadores.find(j => j.id === ins?.id_jugador);
                        const medals = ['🥇','🥈','🥉'];
                        const rank = i < 3 ? medals[i] : `<span class="text-gray-400 font-black">${i+1}</span>`;
                        const hi = (k) => (s[k]||0) > 0 && (s[k]||0) === best[k] && best[k] > 0
                            ? 'font-black text-blue-600' : 'text-gray-600';
                        return `
                        <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                            <td class="px-5 py-3 flex items-center gap-3">
                                <span class="w-6 text-center text-sm">${rank}</span>
                                <div class="w-8 h-8 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center font-black text-xs shrink-0">
                                    ${escHTML((jug?.nombre||'?').charAt(0))}
                                </div>
                                <div>
                                    <p class="font-bold text-gray-800">${escHTML(jug?.nombre || '—')}</p>
                                    <p class="text-[10px] text-gray-400">#${ins?.numero_camiseta || '?'}</p>
                                </div>
                            </td>
                            <td class="text-center px-3 py-3 font-black text-blue-600 text-base">${s.puntos||0}</td>
                            <td class="text-center px-3 py-3 ${hi('ataque')}">${s.ataque||0}</td>
                            <td class="text-center px-3 py-3 ${hi('bloqueo')}">${s.bloqueo||0}</td>
                            <td class="text-center px-3 py-3 ${hi('saque')}">${s.saque||0}</td>
                            <td class="text-center px-3 py-3 ${hi('defensa')}">${s.defensa||0}</td>
                            <td class="text-center px-3 py-3 ${hi('colocacion')}">${s.colocacion||0}</td>
                        </tr>`;
                    }).join('')}
                    </tbody>
                </table>
            </div>
        </div>`;
}
</script>
</body>
</html>
