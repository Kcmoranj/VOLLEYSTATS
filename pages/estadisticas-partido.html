<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VolleyStats - Partido</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/brand.css">
    <style>
        /* ── Cancha mini ── */
        .cfield { background:white; border:1.5px solid #e5e7eb; border-radius:.6rem; padding:.4rem; display:grid; grid-template-rows:1fr 1fr; gap:.3rem; }
        .crow   { display:grid; grid-template-columns:1fr 1fr 1fr; gap:.3rem; }
        .ccell  { background:#f9fafb; border:1px solid #e5e7eb; border-radius:.35rem;
                  display:flex; flex-direction:column; align-items:center; justify-content:center;
                  padding:.25rem .2rem; min-height:2.6rem; }
        .ccell.on { background:#eff6ff; border-color:#bfdbfe; }
        .ccell.saque { box-shadow:0 0 0 2px #f59e0b; background:#fffbeb; border-color:#fcd34d; }
        .cnum  { font-size:.5rem; font-weight:900; color:#9ca3af; line-height:1; }
        .cname { font-size:.55rem; font-weight:700; color:#374151; text-align:center;
                 max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:.1rem; line-height:1.2; }
        .crole { font-size:.42rem; font-weight:900; color:white;
                 background:#2563eb; border-radius:.2rem; padding:0 .2rem; margin-top:.1rem; line-height:1.4; }
        .cnet  { height:.35rem; background:#e5e7eb; border-radius:.2rem; margin:.2rem 0;
                 display:flex; align-items:center; justify-content:center; }
        .cnet span { font-size:.45rem; font-weight:900; color:#6b7280; background:#e5e7eb; padding:0 .3rem; border-radius:.15rem; }
        .clibero { display:flex; align-items:center; gap:.4rem; padding:.35rem .6rem;
                   background:#f3e8ff; border:1px solid #e9d5ff; border-radius:.5rem; margin-top:.4rem; }
        .clibero .lb { font-size:.45rem; font-weight:900; color:#7c3aed;
                       background:#ede9fe; padding:.1rem .3rem; border-radius:.2rem; }

        /* ── Marcador en vivo ── */
        .score-num { font-size:5rem; font-weight:900; line-height:1; }
        .saque-pill { display:inline-flex; align-items:center; gap:.4rem;
                      background:#fef3c7; border:1.5px solid #fcd34d; color:#92400e;
                      font-size:.7rem; font-weight:900; padding:.35rem .8rem;
                      border-radius:9999px; }

        /* ── Set bars ── */
        .set-bar-wrap { display:flex; gap:.2rem; align-items:center; }
        .set-bar { height:.4rem; border-radius:9999px; min-width:.4rem; }
    </style>
</head>
<body class="bg-[#F3F4F6] flex min-h-screen font-sans">

    <!-- Mobile topbar -->
    <div class="lg:hidden fixed top-0 left-0 right-0 z-20 bg-white border-b flex items-center gap-3 px-4 h-14 shadow-sm">
        <button onclick="openSidebar()" class="text-gray-700 text-xl font-bold">&#9776;</button>
        <span class="text-lg font-black">Volley<span class="text-blue-600">Stats</span></span>
    </div>
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/40 z-30 hidden lg:hidden" onclick="closeSidebar()"></div>
    <aside id="sidebar" class="fixed lg:sticky top-0 left-0 h-screen z-40 w-64 bg-white border-r flex flex-col -translate-x-full lg:translate-x-0 transition-transform duration-200 ease-in-out">
        <div class="flex-1 min-h-0 overflow-y-auto py-4 px-3 space-y-1">
            <a href="partidos.html" class="flex items-center gap-2 px-4 pb-4 border-b border-gray-100 mb-2">
                <span class="text-2xl font-black">Volley<span class="text-blue-600">Stats</span></span>
            </a>
            <a href="partidos.html" class="flex items-center gap-3 p-3 rounded-lg font-semibold hover:bg-gray-100 text-gray-600" onclick="closeSidebar()">📅 Partidos</a>
            <a href="liga.html" class="flex items-center gap-3 p-3 rounded-lg font-semibold hover:bg-gray-100 text-gray-600" onclick="closeSidebar()">🏆 Liga</a>
            <a href="jugadores.html" class="flex items-center gap-3 p-3 rounded-lg font-semibold hover:bg-gray-100 text-gray-600" onclick="closeSidebar()">👤 Jugadores</a>
            <a href="estadisticas.html" class="flex items-center gap-3 p-3 rounded-lg font-semibold hover:bg-gray-100 text-gray-600" onclick="closeSidebar()">📊 Estadísticas</a>
        </div>
        <div class="shrink-0 px-3 py-4 border-t">
            <button onclick="window.logout('../index.html')" class="flex items-center gap-3 px-4 py-3 rounded-xl w-full text-left font-semibold text-sm text-red-600 hover:bg-red-50">
                <span>➡️</span>Cerrar sesión
            </button>
        </div>
    </aside>
    <script>
    function openSidebar()  { document.getElementById('sidebar').classList.remove('-translate-x-full'); document.getElementById('sidebarOverlay').classList.remove('hidden'); }
    function closeSidebar() { document.getElementById('sidebar').classList.add('-translate-x-full');    document.getElementById('sidebarOverlay').classList.add('hidden'); }
    </script>

    <main class="flex-1 overflow-y-auto pt-16 lg:pt-0 ">
        <div class="p-6 md:p-8 max-w-4xl mx-auto space-y-6">

            <a href="partidos.html" class="text-blue-600 font-bold text-sm hover:underline block">← Volver al calendario</a>

            <!-- ① Cabecera del partido (blanca, limpia) -->
            <div id="secHeader" class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6"></div>

            <!-- ② Marcador en vivo (aparece solo cuando EN_PROGRESO) -->
            <div id="secVivo" class="hidden"></div>

            <!-- ③ Canchas en vivo (formación actual del set en curso) -->
            <div id="secCanchasVivo" class="hidden"></div>



            <!-- ⑤ Alineaciones iniciales (R5) — colapsable -->
            <details id="secAlineaciones" class="hidden bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                <summary class="px-6 py-4 cursor-pointer select-none font-black text-sm text-gray-700 flex items-center justify-between hover:bg-gray-50">
                    🏐 Alineaciones por set <span class="text-gray-400 font-normal text-xs">toca para ver</span>
                </summary>
                <div id="secAlineacionesBody" class="px-6 pb-6 pt-2"></div>
            </details>

            <!-- ⑥ Estadísticas -->
            <div id="secStats" class="hidden bg-white rounded-2xl border border-gray-100 shadow-sm p-6"></div>

            <!-- ⑦ Historial del partido (libro: sust + TM + tarjetas) — colapsable -->
            <details id="secHistorial" class="hidden bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                <summary class="px-6 py-4 cursor-pointer select-none font-black text-sm text-gray-700 flex items-center justify-between hover:bg-gray-50">
                    📋 Historial del partido <span class="text-gray-400 font-normal text-xs">sustituciones, tiempos muertos, tarjetas</span>
                </summary>
                <div id="secHistorialBody" class="px-6 pb-6 pt-2"></div>
            </details>

        </div>
    </main>

    <script src="../js/mock-data.js"></script>
    <script src="../js/shared/data-bridge.js"></script>
    <script src="../js/shared/sanciones.js"></script>
    <script src="../js/modules/auth.js"></script>
    <script src="../js/modules/admin/partido-vivo.js"></script>
<script>
const escHTML = window.escHTML;

const ROLES_LABEL = { armador:'ARM', opuesto:'OPU', punta1:'PTA', punta2:'PTA', central1:'CEN', central2:'CEN', libero:'LÍB' };
const POS_ORDER   = ['pos4','pos3','pos2','pos5','pos6','pos1'];

document.addEventListener('DOMContentLoaded', () => {
    renderPartido();
    setInterval(() => {
        const data = window.AppDB.get();
        const idP  = parseInt(new URLSearchParams(window.location.search).get('id'));
        const p    = data.partidos?.find(x => x.id === idP);
        if (p && window.normalizarEstado(p.estado) === 'EN_PROGRESO') renderPartido();
    }, 4000);
});

function renderPartido() {
    const data     = window.AppDB.get();
    const idP      = parseInt(new URLSearchParams(window.location.search).get('id'));
    const partido  = data.partidos?.find(p => p.id === idP);
    if (!partido) return;

    const lp   = data.participaciones.find(p => p.id === partido.id_local_participacion);
    const vp   = data.participaciones.find(p => p.id === partido.id_visitante_participacion);
    const eqL  = data.equipos.find(e => e.id === lp?.id_equipo);
    const eqV  = data.equipos.find(e => e.id === vp?.id_equipo);
    const cat  = data.categoriasTorneo.find(c => c.id === lp?.id_categoria_torneo);
    const rama = data.ramas.find(r => r.id === lp?.id_rama);
    const estado = window.normalizarEstado(partido.estado);

    let sL = 0, sV = 0;
    (partido.sets || []).forEach(s => { if (s.local > s.visitante) sL++; else if (s.visitante > s.local) sV++; });

    document.title = `${eqL?.nombre || 'Local'} vs ${eqV?.nombre || 'Visitante'} | VolleyStats`;

    // ── ① Cabecera limpia ────────────────────────────────────────
    const estadoBadge =
        estado === 'EN_PROGRESO' ? `<span class="inline-flex items-center gap-1 bg-red-100 text-red-600 text-xs font-black px-3 py-1 rounded-full animate-pulse">🔴 En vivo</span>` :
        estado === 'FINALIZADO'  ? (partido.wo
            ? `<span class="inline-flex bg-amber-100 text-amber-700 text-xs font-black px-3 py-1 rounded-full">W.O.</span>`
            : `<span class="inline-flex bg-green-100 text-green-700 text-xs font-black px-3 py-1 rounded-full">✅ Finalizado</span>`)
        : `<span class="inline-flex bg-gray-100 text-gray-500 text-xs font-bold px-3 py-1 rounded-full">📅 Programado</span>`;

    document.getElementById('secHeader').innerHTML = `
        <div class="flex items-center gap-3 mb-5 flex-wrap">
            ${estadoBadge}
            <span class="text-xs text-gray-400 font-bold">${cat?.nombre || ''} · ${rama?.nombre || ''}</span>
            <span class="text-xs text-gray-400 ml-auto">📅 ${partido.fecha} · 🕒 ${partido.hora || '—'} · 📍 ${escHTML(partido.ubicacion || '—')}</span>
        </div>
        <div class="grid grid-cols-3 items-center gap-4">
            <div class="text-center">
                <div class="w-14 h-14 rounded-2xl bg-blue-50 border border-blue-100 flex items-center justify-center text-2xl mx-auto mb-2">🛡️</div>
                <p class="font-black text-gray-900 text-lg leading-tight">${escHTML(eqL?.nombre || 'Local')}</p>
                <p class="text-[10px] text-gray-400 font-bold uppercase mt-0.5">Local</p>
            </div>
            <div class="text-center">
                <div class="flex items-center justify-center gap-3">
                    <span class="text-4xl font-black ${sL > sV && estado==='FINALIZADO' ? 'text-blue-600' : 'text-gray-300'}">${sL}</span>
                    <span class="text-gray-300 text-2xl font-light">–</span>
                    <span class="text-4xl font-black ${sV > sL && estado==='FINALIZADO' ? 'text-blue-600' : 'text-gray-300'}">${sV}</span>
                </div>
                <p class="text-[9px] text-gray-400 font-black uppercase tracking-widest mt-1">sets</p>
                ${partido.sets?.length ? `<div class="flex justify-center gap-1.5 mt-2 flex-wrap">
                    ${partido.sets.map((s,i) => `<span class="text-[10px] font-bold text-gray-500 bg-gray-50 border border-gray-100 px-2 py-0.5 rounded-lg">
                        ${s.local}–${s.visitante}
                    </span>`).join('')}
                </div>` : ''}
            </div>
            <div class="text-center">
                <div class="w-14 h-14 rounded-2xl bg-slate-50 border border-slate-100 flex items-center justify-center text-2xl mx-auto mb-2">🛡️</div>
                <p class="font-black text-gray-900 text-lg leading-tight">${escHTML(eqV?.nombre || 'Visitante')}</p>
                <p class="text-[10px] text-gray-400 font-bold uppercase mt-0.5">Visitante</p>
            </div>
        </div>`;

    // ── ② Marcador en vivo ───────────────────────────────────────
    const vivoEl = document.getElementById('secVivo');
    const canchasEl = document.getElementById('secCanchasVivo');
    if (estado === 'EN_PROGRESO' && partido.vivo) {
        const v = partido.vivo;
        const sacaLocal = v.saqueActual === 'local';
        vivoEl.classList.remove('hidden');
        vivoEl.innerHTML = `
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
                <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
                    <span class="text-xs font-black text-gray-400 uppercase tracking-wider">Set ${v.setActual || 1} — En curso</span>
                    <span class="saque-pill">🏐 Saca: ${escHTML(sacaLocal ? (eqL?.nombre||'Local') : (eqV?.nombre||'Visitante'))}</span>
                </div>
                <div class="grid grid-cols-3 items-center gap-4 text-center">
                    <div>
                        <p class="text-xs font-black text-gray-500 uppercase mb-2">${escHTML(eqL?.nombre||'Local')}</p>
                        <p class="score-num ${sacaLocal ? 'text-blue-600' : 'text-gray-700'}">${v.local?.puntos ?? 0}</p>
                        ${sacaLocal ? '<p class="text-[10px] text-amber-600 font-black mt-1">● al saque</p>' : '<p class="text-[10px] text-transparent mt-1">·</p>'}
                    </div>
                    <div class="text-gray-200 text-3xl font-light">–</div>
                    <div>
                        <p class="text-xs font-black text-gray-500 uppercase mb-2">${escHTML(eqV?.nombre||'Visitante')}</p>
                        <p class="score-num ${!sacaLocal ? 'text-blue-600' : 'text-gray-700'}">${v.visitante?.puntos ?? 0}</p>
                        ${!sacaLocal ? '<p class="text-[10px] text-amber-600 font-black mt-1">● al saque</p>' : '<p class="text-[10px] text-transparent mt-1">·</p>'}
                    </div>
                </div>
            </div>`;

        // ── ③ Canchas en vivo ────────────────────────────────────
        const setActual = v.setActual || 1;
        const r5L = (data.r5||[]).find(r => r.id_partido===idP && r.id_participacion===partido.id_local_participacion && r.numero_set===setActual);
        const r5V = (data.r5||[]).find(r => r.id_partido===idP && r.id_participacion===partido.id_visitante_participacion && r.numero_set===setActual);

        if (r5L || r5V) {
            canchasEl.classList.remove('hidden');
            const rotL = (r5L && v.local?.rotaciones != null) ? v.local.rotaciones : 0;
            const rotV = (r5V && v.visitante?.rotaciones != null) ? v.visitante.rotaciones : 0;
            canchasEl.innerHTML = `
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-wider mb-4">Posiciones actuales — Set ${setActual}</p>
                    <div class="grid grid-cols-2 gap-5">
                        <div>
                            <p class="text-xs font-bold text-gray-700 mb-2">${escHTML(eqL?.nombre||'Local')}</p>
                            ${r5L ? buildCanchaViva(data, r5L, rotL, sacaLocal) : sinR5()}
                        </div>
                        <div>
                            <p class="text-xs font-bold text-gray-700 mb-2">${escHTML(eqV?.nombre||'Visitante')}</p>
                            ${r5V ? buildCanchaViva(data, r5V, rotV, !sacaLocal) : sinR5()}
                        </div>
                    </div>
                </div>`;
        } else {
            canchasEl.classList.add('hidden');
        }
    } else {
        vivoEl.classList.add('hidden');
        canchasEl.classList.add('hidden');
    }

    // ── ⑤ Alineaciones R5 (colapsable) ──────────────────────────
    const r5All = (data.r5||[]).filter(r => r.id_partido===idP);
    const r5AllL = r5All.filter(r => r.id_participacion===partido.id_local_participacion);
    const r5AllV = r5All.filter(r => r.id_participacion===partido.id_visitante_participacion);
    if (r5AllL.length || r5AllV.length) {
        const det = document.getElementById('secAlineaciones');
        det.classList.remove('hidden');
        const body = document.getElementById('secAlineacionesBody');
        const sets = [...new Set(r5All.map(r => r.numero_set||1))].sort();
        body.innerHTML = sets.map(numSet => {
            const rL = r5AllL.find(r=>(r.numero_set||1)===numSet);
            const rV = r5AllV.find(r=>(r.numero_set||1)===numSet);
            if (!rL && !rV) return '';
            return `
            <div class="mb-5">
                <p class="text-[10px] font-black text-blue-600 uppercase tracking-wider mb-3">Set ${numSet}${numSet===3?' (tie-break)':''}</p>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <p class="text-xs font-bold text-gray-600 mb-2">${escHTML(eqL?.nombre||'Local')}</p>
                        ${rL ? buildCanchaStatic(data, rL) : sinR5()}
                    </div>
                    <div>
                        <p class="text-xs font-bold text-gray-600 mb-2">${escHTML(eqV?.nombre||'Visitante')}</p>
                        ${rV ? buildCanchaStatic(data, rV) : sinR5()}
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    // ── ⑥ Estadísticas ──────────────────────────────────────────
    const stats = (data.estadisticasJugador||[]).filter(s=>s.id_partido===idP);
    if (stats.length) {
        const sec = document.getElementById('secStats');
        sec.classList.remove('hidden');
        const insL = data.inscripciones.filter(i=>i.id_participacion===partido.id_local_participacion).map(i=>i.id);
        const insV = data.inscripciones.filter(i=>i.id_participacion===partido.id_visitante_participacion).map(i=>i.id);
        const sL2  = stats.filter(s=>insL.includes(s.id_inscripcion)).sort((a,b)=>(b.puntos||0)-(a.puntos||0));
        const sV2  = stats.filter(s=>insV.includes(s.id_inscripcion)).sort((a,b)=>(b.puntos||0)-(a.puntos||0));
        window._statsTeams={local:sL2,visitante:sV2}; window._statsData=data;
        window._eqL=eqL; window._eqV=eqV;
        sec.innerHTML = `
            <p class="text-[10px] font-black text-gray-400 uppercase tracking-wider mb-4">Estadísticas</p>
            <div class="flex gap-2 mb-4" id="statsTabs">
                <button onclick="setStatsTab('local')"    id="tabStatsLocal"   class="px-3 py-1.5 rounded-lg text-xs font-black uppercase bg-blue-600 text-white">${escHTML(eqL?.nombre||'Local')}</button>
                <button onclick="setStatsTab('visitante')" id="tabStatsVisita" class="px-3 py-1.5 rounded-lg text-xs font-black uppercase bg-white text-gray-500 border border-gray-200">${escHTML(eqV?.nombre||'Visitante')}</button>
                <button onclick="setStatsTab('todos')"    id="tabStatsTodos"   class="px-3 py-1.5 rounded-lg text-xs font-black uppercase bg-white text-gray-500 border border-gray-200">Todos</button>
            </div>
            <div id="statsContent"></div>`;
        renderStatsTab('local');
    }

    // ── ⑦ Historial colapsable (libro + tarjetas) ────────────────
    const sust     = (data.sustitucionesPartido||[]).filter(s=>s.id_partido===idP);
    const tms      = (data.tiemposMuertosPartido||[]).filter(t=>t.id_partido===idP);
    const tarjetas = (data.sancionesJugador||[]).filter(s=>s.id_partido===idP);

    if (sust.length || tms.length || tarjetas.length) {
        const det  = document.getElementById('secHistorial');
        const body = document.getElementById('secHistorialBody');
        det.classList.remove('hidden');

        const getEq  = (idPart) => { const p=data.participaciones.find(x=>x.id===idPart); return data.equipos.find(e=>e.id===p?.id_equipo)?.nombre||'—'; };
        const getIns = (idIns) => { if(!idIns) return '—'; const ins=data.inscripciones.find(i=>i.id===idIns); const j=data.jugadores.find(x=>x.id===ins?.id_jugador); return ins&&j?`#${ins.numero_camiseta} ${j.nombre.split(' ')[0]}`:'—'; };

        const sets = [...new Set([...sust.map(s=>s.numero_set), ...tms.map(t=>t.numero_set)])].sort();
        const libroHTML = sets.length ? `
            <p class="text-[10px] font-black text-gray-400 uppercase tracking-wider mb-3">Sustituciones y tiempos muertos</p>
            ${sets.map(numSet => {
                const ss = sust.filter(s=>s.numero_set===numSet);
                const ts = tms.filter(t=>t.numero_set===numSet);
                const filas = [
                    ...ss.map(s=>({tipo:'sust',punto:s.punto,idPart:s.id_participacion,sale:getIns(s.id_inscripcion_sale),entra:getIns(s.id_inscripcion_entra)})),
                    ...ts.map(t=>({tipo:'tm',punto:t.punto,idPart:t.id_participacion}))
                ].sort((a,b)=>(a.punto||999)-(b.punto||999));
                if (!filas.length) return '';
                return `<div class="mb-4">
                    <p class="text-xs font-bold text-gray-500 mb-2">Set ${numSet}</p>
                    <div class="space-y-1">
                    ${filas.map(f => f.tipo==='sust'
                        ? `<div class="flex items-center gap-2 text-xs bg-gray-50 rounded-lg px-3 py-2">
                            <span class="text-gray-400 w-12 shrink-0">${f.punto!=null?`Pto.${f.punto}`:'—'}</span>
                            <span class="text-gray-500 font-bold shrink-0">${escHTML(getEq(f.idPart))}</span>
                            <span class="text-red-500 font-bold">▼ ${escHTML(f.sale)}</span>
                            <span class="text-gray-300">→</span>
                            <span class="text-green-600 font-bold">▲ ${escHTML(f.entra)}</span>
                           </div>`
                        : `<div class="flex items-center gap-2 text-xs bg-gray-50 rounded-lg px-3 py-2">
                            <span class="text-gray-400 w-12 shrink-0">${f.punto!=null?`Pto.${f.punto}`:'—'}</span>
                            <span class="text-gray-500 font-bold">${escHTML(getEq(f.idPart))}</span>
                            <span class="text-amber-600 font-bold">⏱ Tiempo muerto</span>
                           </div>`
                    ).join('')}
                    </div>
                </div>`;
            }).join('')}` : '';

        const tarjetasHTML = tarjetas.length ? `
            <p class="text-[10px] font-black text-gray-400 uppercase tracking-wider mt-4 mb-3">Tarjetas</p>
            <div class="space-y-1">
            ${tarjetas.map(t => {
                const ins  = data.inscripciones.find(i=>i.id===t.id_inscripcion);
                const jug  = data.jugadores.find(j=>j.id===ins?.id_jugador);
                const part = data.participaciones.find(p=>p.id===ins?.id_participacion);
                const eq   = data.equipos.find(e=>e.id===part?.id_equipo);
                const badge = t.tipo==='ROJA'
                    ? '<span class="badge badge-error badge-sm text-white font-bold">🟥 Roja</span>'
                    : '<span class="badge badge-warning badge-sm text-white font-bold">🟨 Amarilla</span>';
                const susp = (t.partidos_suspension||0)>0 ? `<span class="text-red-500 text-xs font-bold ml-auto">${t.partidos_suspension} susp.</span>` : '';
                return `<div class="flex items-center gap-3 text-xs bg-gray-50 rounded-lg px-3 py-2">
                    ${badge}
                    <span class="font-bold text-gray-800">${escHTML(jug?.nombre||'—')}</span>
                    <span class="text-gray-400">${escHTML(eq?.nombre||'—')}</span>
                    ${t.motivo ? `<span class="text-gray-400 ml-auto">${escHTML(t.motivo)}</span>` : susp}
                </div>`;
            }).join('')}
            </div>` : '';

        body.innerHTML = libroHTML + tarjetasHTML;
    }
}

// ── Helpers de cancha ────────────────────────────────────────────

function buildCanchaStatic(data, r5) {
    return buildCanchaViva(data, r5, 0, false);
}

function buildCanchaViva(data, r5, rotaciones, tieneSaque) {
    const alin  = r5.alineacion || {};
    const roles = r5.roles || {};
    // Build inscripcion→rol map
    const rolDeIns = {};
    Object.entries(roles).forEach(([rk, idIns]) => { if (idIns) rolDeIns[idIns] = rk; });

    // Apply rotations: rotate the position keys
    const baseOrder = ['pos1','pos2','pos3','pos4','pos5','pos6'];
    const rot = ((rotaciones||0) % 6 + 6) % 6;
    const rotated = baseOrder.map((_,i) => baseOrder[(i + rot) % 6]);
    // Map displayed position → rotated position key
    const displayKeys = ['pos4','pos3','pos2','pos5','pos6','pos1'];
    const actualKeys  = displayKeys.map(dk => {
        const baseIdx = baseOrder.indexOf(dk);
        return rotated[baseIdx];
    });

    const getInfo = (posKey) => {
        const idIns = alin[posKey];
        if (!idIns) return { name: null, rolKey: null };
        const ins = data.inscripciones.find(i=>i.id===idIns);
        const j   = data.jugadores.find(x=>x.id===ins?.id_jugador);
        const rolKey = rolDeIns[idIns] || null;
        return { name: j ? `#${ins.numero_camiseta} ${j.nombre.split(' ')[0]}` : null, rolKey };
    };

    // pos1 is service position — highlight it if this team has saque
    const cell = (posKey, displayRoman, isServe) => {
        const { name, rolKey } = getInfo(posKey);
        const rolLabel = rolKey ? (ROLES_LABEL[rolKey]||'') : '';
        const sacaClass = isServe && tieneSaque ? 'saque' : '';
        return `<div class="ccell ${name?'on':''} ${sacaClass}">
            <span class="cnum">${displayRoman}</span>
            ${name ? `<span class="cname">${escHTML(name)}</span>` : ''}
            ${rolLabel ? `<span class="crole">${rolLabel}</span>` : ''}
        </div>`;
    };

    const libId = alin.libero;
    const libIns = libId ? data.inscripciones.find(i=>i.id===libId) : null;
    const libJ   = libIns ? data.jugadores.find(x=>x.id===libIns.id_jugador) : null;
    const libName = libJ ? `#${libIns.numero_camiseta} ${libJ.nombre.split(' ')[0]}` : null;

    // actualKeys[i] maps to display positions [IV, III, II, V, VI, I]
    const romans = ['IV','III','II','V','VI','I'];
    const cells  = actualKeys.map((ak, i) => cell(ak, romans[i], ak==='pos1'));

    return `
    <div>
        <div class="cnet"><span>RED</span></div>
        <div class="cfield">
            <div class="crow">${cells[0]}${cells[1]}${cells[2]}</div>
            <div class="crow">${cells[3]}${cells[4]}${cells[5]}</div>
        </div>
        <div class="cnet mt-1"><span>FONDO</span></div>
        ${libName ? `<div class="clibero"><span class="lb">LÍB</span><span style="font-size:.55rem;font-weight:700;color:#6d28d9">${escHTML(libName)}</span></div>` : ''}
    </div>`;
}

function sinR5() {
    return `<p class="text-gray-400 italic text-xs text-center py-4">Sin alineación registrada</p>`;
}

// ── Stats tab ────────────────────────────────────────────────────

let _statsTab = 'local';

window.setStatsTab = function(tab) {
    _statsTab = tab;
    ['Local','Visita','Todos'].forEach(t => {
        const el = document.getElementById(`tabStats${t}`);
        if (!el) return;
        const active = (t.toLowerCase()==='local'&&tab==='local') || (t.toLowerCase()==='visita'&&tab==='visitante') || (t.toLowerCase()==='todos'&&tab==='todos');
        el.className = `px-3 py-1.5 rounded-lg text-xs font-black uppercase ${active ? 'bg-blue-600 text-white' : 'bg-white text-gray-500 border border-gray-200'}`;
    });
    renderStatsTab(tab);
};

function renderStatsTab(tab) {
    const el = document.getElementById('statsContent');
    if (!el) return;
    const data  = window._statsData;
    const teams = window._statsTeams;
    if (!data||!teams) return;

    const rows = tab==='todos' ? [...teams.local,...teams.visitante].sort((a,b)=>(b.puntos||0)-(a.puntos||0))
               : tab==='local' ? teams.local : teams.visitante;

    if (!rows.length) { el.innerHTML='<p class="text-gray-400 text-sm text-center py-4">Sin estadísticas.</p>'; return; }

    const hi = (cat) => {
        const max = Math.max(...rows.map(r=>r[cat]||0));
        return (val) => val>0&&val===max ? 'text-blue-600 font-black' : '';
    };
    const hiP=hi('puntos'),hiA=hi('ataque'),hiB=hi('bloqueo'),hiS=hi('saque'),hiD=hi('defensa'),hiC=hi('colocacion');

    el.innerHTML = `
    <div class="overflow-x-auto">
    <table class="w-full text-xs text-left">
        <thead><tr class="text-[10px] text-gray-400 uppercase border-b border-gray-100 font-bold">
            <th class="pb-2 pr-2">Jugador</th>
            <th class="pb-2 px-2 text-center">Pts</th>
            <th class="pb-2 px-1 text-center">Atq</th>
            <th class="pb-2 px-1 text-center">Blq</th>
            <th class="pb-2 px-1 text-center">Saq</th>
            <th class="pb-2 px-1 text-center">Def</th>
            <th class="pb-2 px-1 text-center">Col</th>
        </tr></thead>
        <tbody class="divide-y divide-gray-50 font-medium">
        ${rows.map(s => {
            const ins = data.inscripciones.find(i=>i.id===s.id_inscripcion);
            const j   = data.jugadores.find(x=>x.id===ins?.id_jugador);
            return `<tr>
                <td class="py-2 pr-2">
                    <span class="font-bold text-gray-800">${escHTML(j?.nombre||'—')}</span>
                    <span class="text-gray-400 ml-1 text-[10px]">#${ins?.numero_camiseta||'?'}</span>
                </td>
                <td class="py-2 px-2 text-center text-base font-black text-blue-600">${s.puntos||0}</td>
                <td class="py-2 px-1 text-center ${hiA(s.ataque||0)}">${s.ataque||0}</td>
                <td class="py-2 px-1 text-center ${hiB(s.bloqueo||0)}">${s.bloqueo||0}</td>
                <td class="py-2 px-1 text-center ${hiS(s.saque||0)}">${s.saque||0}</td>
                <td class="py-2 px-1 text-center ${hiD(s.defensa||0)}">${s.defensa||0}</td>
                <td class="py-2 px-1 text-center ${hiC(s.colocacion||0)}">${s.colocacion||0}</td>
            </tr>`;
        }).join('')}
        </tbody>
    </table>
    </div>`;
}
</script>
