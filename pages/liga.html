<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VolleyStats - Tabla de Posiciones</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/brand.css">
    <script>
      tailwind.config = { corePlugins: { preflight: true } }
    </script>
</head>
<body class="bg-[#F3F4F6] flex min-h-screen font-sans">

    <!-- Mobile topbar -->
    <div class="lg:hidden fixed top-0 left-0 right-0 z-20 bg-white border-b flex items-center gap-3 px-4 h-14 shadow-sm">
        <button onclick="openSidebar()" class="text-gray-700 text-xl font-bold">&#9776;</button>
        <span class="text-lg font-black">Volley<span class="text-blue-600">Stats</span></span>
    </div>

    <!-- Overlay (mobile) -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/40 z-30 hidden lg:hidden" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed lg:sticky top-0 left-0 h-screen z-40 w-64 bg-white border-r flex flex-col -translate-x-full lg:translate-x-0 transition-transform duration-200 ease-in-out">
        <div class="flex-1 min-h-0 overflow-y-auto py-4 px-3 space-y-1">
            <a href="partidos.html" class="flex items-center gap-2 px-4 pb-4 border-b border-gray-100 mb-2">
                <span class="text-2xl font-black">Volley<span class="text-blue-600">Stats</span></span>
            </a>
            <a href="partidos.html" class="flex items-center gap-3 p-3 rounded-lg font-semibold hover:bg-gray-100 text-gray-600" onclick="closeSidebar()">📅 Partidos</a>
            <a href="liga.html" class="flex items-center gap-3 p-3 rounded-lg font-semibold bg-blue-50 text-blue-600" onclick="closeSidebar()">🏆 Liga</a>
            <a href="jugadores.html" class="flex items-center gap-3 p-3 rounded-lg font-semibold hover:bg-gray-100 text-gray-600" onclick="closeSidebar()">👤 Jugadores</a>
            <a href="estadisticas.html" class="flex items-center gap-3 p-3 rounded-lg font-semibold hover:bg-gray-100 text-gray-600" onclick="closeSidebar()">📊 Estadísticas</a>
        </div>
        <div class="shrink-0 px-3 py-4 border-t">
            <button onclick="window.logout('../index.html')" class="flex items-center gap-3 px-4 py-3 rounded-xl w-full text-left font-semibold text-sm text-red-600 hover:bg-red-50">
                <span>➡️</span>Cerrar sesión
            </button>
        </div>
    </aside>

    <script>
    function openSidebar()  { document.getElementById('sidebar').classList.remove('-translate-x-full'); document.getElementById('sidebarOverlay').classList.remove('hidden'); }
    function closeSidebar() { document.getElementById('sidebar').classList.add('-translate-x-full');    document.getElementById('sidebarOverlay').classList.add('hidden'); }
    </script>

<main class="flex-1 p-4 md:p-8 space-y-6 overflow-y-auto pt-16 lg:pt-0 ">

    <div>
        <h2 class="text-2xl font-black text-gray-900 tracking-tight">Tabla de Posiciones</h2>
        <p class="text-xs text-gray-400 font-semibold mt-1 uppercase tracking-wider">Solo partidos finalizados</p>
    </div>

    <!-- Filtro -->
    <section class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
        <div class="relative border border-gray-200 rounded-xl px-3 py-1.5 focus-within:border-blue-600 transition-all">
            <span class="text-[10px] font-bold text-blue-600 uppercase tracking-wider block absolute -top-2 left-3 bg-white px-1">
                Categoría · Rama
            </span>
            <select id="selectCategoriaPosiciones"
                    class="w-full bg-white text-sm font-bold text-gray-800 outline-none pt-1 cursor-pointer appearance-none">
            </select>
            <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-gray-400 text-xs">▼</div>
        </div>
    </section>

    <!-- Tablas por grupo -->
    <div id="contenedorTablasPosiciones" class="space-y-6"></div>

</main>

<script src="../js/mock-data.js"></script>
    <script src="../js/shared/data-bridge.js"></script>
<script src="../js/modules/liga.js"></script>
<script src="../js/modules/auth.js"></script>
</body>
</html>
</html>
